<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--
    Cleartable OG image template — renders at exactly 1200×630.
    To regenerate the PNG: screenshot the .canvas element, or run headless Chrome:
      "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
        --headless --disable-gpu --hide-scrollbars --force-device-scale-factor=1 \
        --window-size=1200,630 --virtual-time-budget=4000 \
        --screenshot="landing-page/og-image.png" \
        "file://$(pwd)/og-image-template.html"
    Output goes to landing-page/og-image.png (served at /og-image.png).
  -->
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=instrument-serif@400i,400&f[]=geist-mono@400,500&f[]=satoshi@400,500,700&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #0b0b13; }

    .canvas {
      width: 1200px;
      height: 630px;
      position: relative;
      overflow: hidden;
      background: #15151E;
      font-family: 'Satoshi', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Aurora orbs (same palette as the site) */
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); }
    .orb-1 { width: 620px; height: 620px; top: -200px; left: -160px;
      background: radial-gradient(circle, rgba(167,139,250,0.70), transparent 70%); }
    .orb-2 { width: 560px; height: 560px; top: -160px; right: -150px;
      background: radial-gradient(circle, rgba(94,234,212,0.55), transparent 70%); }
    .orb-3 { width: 520px; height: 520px; bottom: -240px; left: 160px;
      background: radial-gradient(circle, rgba(251,191,36,0.38), transparent 70%); }
    .orb-4 { width: 520px; height: 520px; bottom: -220px; right: -120px;
      background: radial-gradient(circle, rgba(251,113,133,0.34), transparent 70%); }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 90px;
    }

    .mark {
      width: 96px; height: 96px;
      border-radius: 24px;
      background: #7C3AED;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 48px rgba(124,58,237,0.45);
      margin-bottom: 34px;
    }
    .mark svg { width: 56px; height: 56px; }

    .wordmark {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 104px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: #F5F5F7;
      margin-bottom: 26px;
    }
    .wordmark span { color: #A78BFA; }

    .tagline {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: 38px;
      line-height: 1.3;
      color: #D4D4DC;
      max-width: 880px;
    }

    .url {
      position: absolute;
      bottom: 40px;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Geist Mono', monospace;
      font-size: 16px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6B6B75;
    }

    /* hairline frame for polish */
    .frame { position: absolute; inset: 0; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <div class="content">
      <div class="mark">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 12l3.8 11.6a4 4 0 002.6 2.6L50 30l-11.6 3.8a4 4 0 00-2.6 2.6L32 48l-3.8-11.6a4 4 0 00-2.6-2.6L14 30l11.6-3.8a4 4 0 002.6-2.6L32 12z" fill="#fff"/>
        </svg>
      </div>
      <div class="wordmark">clear<span>table</span></div>
      <div class="tagline">The calm, AI-powered way to organize your tasks, habits &amp; calendar — at work and in life.</div>
    </div>

    <div class="url">cleartable.app</div>
    <div class="frame"></div>
  </div>
</body>
</html>
